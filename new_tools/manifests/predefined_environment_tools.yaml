tools:
  - tool_id: run_shell_command
    version: "1.0.0"
    name: Run Shell Command
    description: "Execute a shell command and return the output. Has a 30-minute timeout for ML tasks."
    category: environment
    author: stella_team
    status: active
    interface:
      function_name: run_shell_command
      module_path: predefined_tools
      parameters:
        - name: command
          type: str
          required: true
          default: null
          description: "The shell command to execute"
        - name: working_directory
          type: str
          required: false
          default: "."
          description: "Optional working directory for the command"
      return_type: str
      return_description: "Command output or error message"
    dependencies:
      python_packages: []
      system_packages: []
      conda_channels:
        - conda-forge
      env_vars_required: []
    validation:
      test_function: ""
      test_module: ""
      last_validated: ""
      validation_status: untested
    provenance:
      created_at: "2025-01-01"
      last_modified: "2026-03-08"
      source: predefined
      changelog:
        - version: "1.0.0"
          date: "2025-01-01"
          changes: "Initial version"
    usage_stats:
      total_calls: 0
      success_count: 0
      failure_count: 0
      avg_execution_time_ms: 0.0

