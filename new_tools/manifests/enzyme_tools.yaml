  - tool_id: run_mmseqs_search
    version: "1.0.0"
    name: Run MMseqs Search
    description: "Use MMseqs 'easy-search' to search directly with a FASTA/FASTQ file against another FASTA/FASTQ file."
    category: protein_analysis
    author: stella_team
    status: active
    interface:
      function_name: run_mmseqs_search
      module_path: new_tools/enzyme_tools
      parameters:
        - name: query_fasta
