  - tool_id: run_mmseqs_cluster
    version: "1.0.0"
    name: Run MMseqs Cluster
    description: "Use MMseqs to cluster entries of a FASTA/FASTQ file based on sequence identity and coverage."
    category: protein_analysis
    author: stella_team
    status: active
    interface:
      function_name: run_mmseqs_cluster
      module_path: new_tools/enzyme_tools
      parameters:
        - name: target_db
          type: str
          required: true
          default: null
          description: "Path to the FASTA file to be clustered"
        - name: result_file
          type: str
          required: true
          default: null
          description: "Path to store the search results"
        - name: tmp_dir
          type: str
          required: true
          default: null
          description: "A temporary directory for MMseqs to use"
        - name: c
          type: float
          required: false
          default: 0.8
          description: "Minimum fraction of aligned (covered) residues"
        - name: min_seq_id
          type: float
          required: false
          default: 0.0
          description: "Minimum sequence identity for clustering (0.0-1.0)"
        - name: threads
          type: int
          required: false
          default: 32
          description: "Number of CPU-cores used"
      return_type: "Dict[str, Any]"
      return_description: "Dictionary containing the path to the clustering results"
    dependencies:
      python_packages:
        - biopython
        - requests
      system_packages:
        - mmseqs2
      conda_channels:
        - conda-forge
        - bioconda
      env_vars_required: []
