        - name: target_db
          type: str
          required: true
          default: null
          description: "Path to the target FASTA file"
        - name: result_file
          type: str
          required: true
          default: null
          description: "Path to store the search results"
        - name: tmp_dir
          type: str
          required: true
          default: null
          description: "A temporary directory for MMseqs to use"
        - name: s
          type: float
          required: false
          default: 5.7
          description: "Sensitivity setting (higher is more sensitive but slower)"
        - name: max_seqs
          type: int
          required: false
          default: 300
          description: "Maximum results per query sequence in prefilter"
        - name: min_seq_id
          type: float
          required: false
          default: 0.0
          description: "Minimum sequence identity (0.0-1.0)"
        - name: c
          type: float
          required: false
          default: 0.0
          description: "Minimum fraction of aligned (covered) residues"
        - name: threads
          type: int
          required: false
          default: 32
          description: "Number of CPU-cores used"
