      module_path: new_tools/virtual_screening_tools
      parameters:
        - name: query_list
          type: "List[str]"
          required: true
          default: null
          description: "List of biological processes, molecular functions, or cellular components to search for"
        - name: max_candidates
          type: int
          required: false
          default: 100
          description: "Maximum number of GO term candidates to consider"
        - name: similarity_threshold
          type: int
          required: false
          default: 10
          description: "Minimum similarity score (0-100) for fuzzy matching"
        - name: model_name
          type: str
          required: false
          default: "gemini-2.5-pro"
          description: "Model name for LLM analysis"
      return_type: "Dict[str, Any]"
      return_description: "Dictionary containing genes associated with each GO term query and normalized relevance scores"
