  - tool_id: tcga_survival_analysis
    version: "1.0.0"
    name: TCGA Survival Analysis
    description: "Identify genes associated with cancer survival from The Cancer Genome Atlas (TCGA) data. Analyzes CNA, methylation, gene expression, miRNA, and mutation data."
    category: drug_discovery
    author: stella_team
    status: active
    interface:
      function_name: tcga_survival_analysis
      module_path: new_tools/virtual_screening_tools
      parameters:
        - name: cancer_types
          type: "List[str]"
          required: true
          default: null
          description: "List of cancer types (common names like 'Breast Cancer' or 'Chronic Myeloid Leukemia')"
        - name: threshold
          type: float
          required: false
          default: 1.96
          description: "Z-score threshold for statistical significance"
        - name: model_name
          type: str
          required: false
          default: "gemini-2.5-pro"
          description: "Model name for LLM analysis"
      return_type: "Dict[str, Any]"
      return_description: "Dictionary containing genes associated with survival for each cancer type with normalized relevance scores"
    dependencies:
      python_packages:
        - requests
        - pandas
        - numpy
        - rapidfuzz
      system_packages: []
      conda_channels:
