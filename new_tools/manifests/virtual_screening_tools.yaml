  - tool_id: screen_data_analysis
    version: "1.0.0"
    name: Screen Data Analysis
    description: "Process and filter genetic screen data to identify significant genes based on statistical measures. Supports p-values, effect sizes, or custom scoring."
    category: drug_discovery
    author: stella_team
    status: active
    interface:
      function_name: screen_data_analysis
      module_path: new_tools/virtual_screening_tools
      parameters:
        - name: input_file
          type: str
          required: true
          default: null
          description: "Path to the input CSV file containing screen results"
        - name: p_value_threshold
          type: float
          required: false
          default: 0.05
          description: "Threshold for p-values"
        - name: effect_size_threshold
          type: "Optional[float]"
          required: false
          default: null
          description: "Threshold for effect sizes (optional)"
        - name: top_n
          type: "Optional[int]"
          required: false
          default: null
          description: "Number of top genes to return (optional)"
        - name: score_column
          type: "Optional[str]"
          required: false
          default: null
          description: "Optional specific column to use for scoring"
        - name: model_name
          type: str
          required: false
          default: "gemini-2.5-pro"
          description: "Model name for LLM analysis"
      return_type: "Dict[str, Any]"
      return_description: "Dictionary containing filtered genes with normalized relevance scores and processing metadata"
    dependencies:
      python_packages:
        - requests
        - pandas
        - numpy
        - rapidfuzz
      system_packages: []
      conda_channels:
