tools:
  - tool_id: fetch_supplementary_info_from_doi
    version: "1.0.0"
    name: Fetch Supplementary Info from DOI
    description: "Fetches supplementary information for a paper given its DOI, downloads supplementary files, and returns a research log."
    category: literature
    author: stella_team
    status: active
    interface:
      function_name: fetch_supplementary_info_from_doi
      module_path: predefined_tools
      parameters:
        - name: doi
          type: str
          required: true
          default: null
          description: "The paper DOI"
        - name: output_dir
          type: str
          required: false
          default: "supplementary_info"
          description: "Directory to save supplementary files"
      return_type: str
      return_description: "A formatted research log string containing the download process and results"
    dependencies:
      python_packages:
        - requests
        - beautifulsoup4
      system_packages: []
      conda_channels:
        - conda-forge
      env_vars_required: []
    validation:
      test_function: ""
      test_module: ""
      last_validated: ""
      validation_status: untested
    provenance:
      created_at: "2025-01-01"
      last_modified: "2026-03-08"
      source: predefined
      changelog:
        - version: "1.0.0"
          date: "2025-01-01"
          changes: "Initial version"
    usage_stats:
      total_calls: 0
      success_count: 0
      failure_count: 0
      avg_execution_time_ms: 0.0

