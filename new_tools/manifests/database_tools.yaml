  - tool_id: query_alphafold
    version: "1.0.0"
    name: Query AlphaFold
    description: "Query the AlphaFold Database API for protein structure predictions. Supports downloading structure files."
    category: database
    author: stella_team
    status: active
    interface:
      function_name: query_alphafold
      module_path: new_tools/database_tools
      parameters:
        - name: uniprot_id
          type: str
          required: true
          default: null
          description: "UniProt accession ID (e.g., 'P12345')"
        - name: endpoint
          type: str
          required: false
          default: "prediction"
          description: "Specific AlphaFold API endpoint: 'prediction', 'summary', or 'annotations'"
        - name: residue_range
          type: str
          required: false
          default: null
          description: "Specific residue range in format 'start-end' (e.g., '1-100')"
        - name: download
          type: bool
          required: false
          default: false
          description: "Whether to download structure files"
        - name: output_dir
          type: str
          required: false
          default: null
          description: "Directory to save downloaded files"
        - name: file_format
          type: str
          required: false
          default: "pdb"
          description: "Format of the structure file to download - 'pdb' or 'cif'"
        - name: model_version
          type: str
          required: false
          default: "v4"
          description: "AlphaFold model version - 'v4' (latest) or 'v3', 'v2', 'v1'"
        - name: model_number
          type: int
          required: false
          default: 1
          description: "Model number (1-5, with 1 being the highest confidence model)"
      return_type: dict
      return_description: "Dictionary containing the query information and the AlphaFold results"
    dependencies:
      python_packages:
        - requests
        - biopython
        - pandas
        - numpy
      system_packages: []
      conda_channels:
        - conda-forge
      env_vars_required: []
