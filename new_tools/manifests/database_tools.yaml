tools:
  - tool_id: query_uniprot
    version: "1.0.0"
    name: Query UniProt
    description: "Query the UniProt REST API using either natural language or a direct endpoint for protein information."
    category: database
    author: stella_team
    status: active
    interface:
      function_name: query_uniprot
      module_path: new_tools/database_tools
      parameters:
        - name: prompt
          type: str
          required: false
          default: null
          description: "Natural language query about proteins (e.g., 'Find information about human insulin')"
        - name: endpoint
          type: str
          required: false
          default: null
          description: "Full or partial UniProt API endpoint URL to query directly"
        - name: max_results
          type: int
          required: false
          default: 5
          description: "Maximum number of results to return"
      return_type: dict
      return_description: "Dictionary containing the query information and the UniProt API results"
    dependencies:
      python_packages:
        - requests
        - biopython
        - pandas
        - numpy
      system_packages: []
      conda_channels:
        - conda-forge
      env_vars_required:
