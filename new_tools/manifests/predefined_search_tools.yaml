tools:
  - tool_id: enhanced_google_search
    version: "1.0.0"
    name: Enhanced Google Search
    description: "Enhanced Google search with reliable implementation using googlesearch-python. Returns well-formatted search results with titles, URLs, and descriptions."
    category: search
    author: stella_team
    status: active
    interface:
      function_name: enhanced_google_search
      module_path: predefined_tools
      parameters:
        - name: query
          type: str
          required: true
          default: null
          description: "Search query"
        - name: num_results
          type: int
          required: false
          default: 5
          description: "Number of results to return"
        - name: include_snippets
          type: bool
          required: false
          default: true
          description: "Whether to include result snippets"
      return_type: str
      return_description: "Well-formatted search results with titles, URLs, and descriptions"
    dependencies:
      python_packages:
        - requests
        - googlesearch-python
        - beautifulsoup4
      system_packages: []
      conda_channels:
        - conda-forge
      env_vars_required: []
