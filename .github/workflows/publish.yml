name: Publish to PyPI

on:
  push:
    tags:
      - "v*"        # triggers on any tag like v0.1.0, v1.2.3
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/stella-agent
    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing (no API token needed).
        # Configure at: https://pypi.org/manage/account/publishing/
        # Set publisher: owner=zaixizhang, repo=STELLA, workflow=publish.yml

  publish-testpypi:
    name: Publish to TestPyPI (on manual trigger)
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/stella-agent
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          # For TestPyPI use: https://test.pypi.org/legacy/
